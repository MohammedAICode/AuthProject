<!DOCTYPE html>
<html>
<head>
    <style>
        .wrapper { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 40px; border-radius: 8px; border-top: 4px solid #dc3545; }
        .btn { display: block; width: 200px; margin: 30px auto; padding: 15px; background-color: #333; color: #ffffff !important; text-decoration: none; border-radius: 5px; text-align: center; }
        .warning { font-size: 12px; color: #d9534f; font-style: italic; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h2>Reset Your Password</h2>
            <p>We received a request to reset your password for your <strong>Auth</strong> account. Click the button below to choose a new one:</p>
            <a href="{{reset_link}}" class="btn">Reset Password</a>
            <p class="warning">This link will expire in 60 minutes for security reasons.</p>
            <hr>
            <p style="font-size: 12px;">If you didn't request this, please change your password immediately or contact support.</p>
        </div>
    </div>
</body>
</html>
