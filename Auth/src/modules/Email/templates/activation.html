<!DOCTYPE html>
<html>
<head>
    <style>
        .wrapper { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 40px; border-radius: 8px; }
        .header { text-align: center; color: #333; }
        .btn { display: block; width: 200px; margin: 30px auto; padding: 15px; background-color: #007bff; color: #ffffff !important; text-decoration: none; border-radius: 5px; text-align: center; font-weight: bold; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <h2 class="header">Welcome to Auth!</h2>
            <p>Thank you for signing up. To get started, please verify your email address by clicking the button below:</p>
            <a href="{{activation_link}}" class="btn">Activate Account</a>
            <p>If you did not create an account, you can safely ignore this email.</p>
        </div>
        <div class="footer">© 2026 Auth Inc. All rights reserved.</div>
    </div>
</body>
</html>
