name: Build on PR

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: Install Dependencies
        run: npm install
        working-directory: ./Auth

      - name: Run Lint
        run: npm run lint
        working-directory: ./Auth
        
      - name: Run Build
        run: npm run build
        working-directory: ./Auth

